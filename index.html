<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Warehouse & Lapangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent; 
        }
        body { 
            font-family: 'Inter', sans-serif; 
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .table-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5); 
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
        .status-w { background-color: #22c55e !important; color: #000 !important; font-weight: 700; }
        .status-p { background-color: #3b82f6 !important; color: #fff !important; font-weight: 700; }
        .status-l { background-color: #ef4444 !important; color: #fff !important; font-weight: 700; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-2 md:p-6 selection:bg-blue-500/30">

    <div class="max-w-6xl mx-auto space-y-4 md:space-y-6">
        <div class="text-center space-y-1 md:space-y-2">
            <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight">Jadwal Shift Terpadu</h1>
            <p class="text-xs md:text-sm text-slate-400 flex items-center justify-center gap-2">
                <i class="ph ph-clock-counter-clockwise"></i>
                Warehouse & Lapangan
            </p>
            <p class="text-xs text-slate-500 flex items-center justify-center gap-1 flex-wrap">
                <span class="inline-block w-3 h-3 rounded bg-green-500"></span> W = Warehouse
                <span class="inline-block w-3 h-3 rounded bg-blue-500 ml-2"></span> P = Lapangan
                <span class="inline-block w-3 h-3 rounded bg-red-500 ml-2"></span> L = Libur
            </p>
        </div>

        <div class="grid grid-cols-2 gap-3 md:gap-6">
            
            <!-- Kalender -->
            <div class="glass-panel rounded-xl md:rounded-2xl p-3 md:p-6 shadow-xl flex flex-col">
                <div class="flex justify-between items-center mb-4 md:mb-6">
                    <button id="prevMonth" class="p-1 md:p-2 hover:bg-slate-700 rounded-lg transition text-slate-300">
                        <i class="ph ph-caret-left text-xl md:text-2xl"></i>
                    </button>
                    <div class="text-center">
                        <h2 id="monthYear" class="text-sm md:text-xl font-semibold text-blue-400 mb-1 leading-tight"></h2>
                        <button id="btnToday" class="inline-flex items-center justify-center gap-1 px-2 py-0.5 md:px-3 md:py-1 rounded-full bg-slate-800 hover:bg-slate-700 text-[10px] md:text-xs text-slate-300 hover:text-white border border-slate-700 transition">
                            <i class="ph ph-calendar-check text-sm text-blue-400"></i> Hari ini
                        </button>
                    </div>
                    <button id="nextMonth" class="p-1 md:p-2 hover:bg-slate-700 rounded-lg transition text-slate-300">
                        <i class="ph ph-caret-right text-xl md:text-2xl"></i>
                    </button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center font-medium text-slate-400 mb-1 md:mb-2 text-[10px] md:text-sm">
                    <div class="text-red-400">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div class="text-blue-300">Sab</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-1 md:gap-2 text-center flex-grow text-[10px] md:text-sm"></div>
            </div>

            <!-- Detail -->
            <div class="glass-panel rounded-xl md:rounded-2xl p-3 md:p-6 shadow-xl border-t-4 border-t-blue-500 flex flex-col overflow-hidden">
                <h2 class="text-sm md:text-xl font-bold mb-1 text-white flex items-center gap-1 md:gap-2">
                    <i class="ph ph-calendar-dots text-blue-400"></i> Detail
                </h2>
                <p id="selectedDateDisplay" class="text-blue-400 font-medium mb-1 text-[10px] md:text-base truncate"></p>
                <p id="cycleDisplay" class="text-[9px] md:text-sm text-slate-400 mb-3 md:mb-4 font-mono bg-slate-800 inline-block px-2 py-1 rounded-md self-start"></p>

                <div class="space-y-3 md:space-y-4 flex-grow overflow-y-auto pr-1">
                    <!-- Warehouse & Lapangan -->
                    <div class="bg-slate-800/50 p-2 md:p-4 rounded-lg md:rounded-xl border border-emerald-500/30">
                        <h3 class="font-semibold text-emerald-400 mb-2 border-b border-slate-700 pb-1 md:pb-2 flex items-center gap-1 md:gap-2 text-xs md:text-base">
                            <i class="ph ph-warehouse"></i> Warehouse & Lapangan
                        </h3>
                        <div class="grid grid-cols-3 gap-1 text-[10px] md:text-sm">
                            <div>
                                <span class="block text-green-400 text-[9px] md:text-xs uppercase tracking-wider">W</span>
                                <div id="g1_w" class="font-medium text-white mt-0.5 text-xs md:text-sm"></div>
                            </div>
                            <div>
                                <span class="block text-blue-400 text-[9px] md:text-xs uppercase tracking-wider">P</span>
                                <div id="g1_p" class="font-medium text-white mt-0.5 text-xs md:text-sm"></div>
                            </div>
                            <div>
                                <span class="block text-red-400 text-[9px] md:text-xs uppercase tracking-wider">L</span>
                                <div id="g1_l" class="font-medium text-red-400 mt-0.5 text-xs md:text-sm"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Lapangan Tetap 1 -->
                    <div class="bg-slate-800/50 p-2 md:p-4 rounded-lg md:rounded-xl border border-purple-500/30">
                        <h3 class="font-semibold text-purple-400 mb-2 border-b border-slate-700 pb-1 md:pb-2 flex items-center gap-1 md:gap-2 text-xs md:text-base">
                            <i class="ph ph-users-three"></i> Lapangan Tetap 1
                        </h3>
                        <div class="grid grid-cols-2 gap-1 text-[10px] md:text-sm">
                            <div>
                                <span class="block text-blue-400 text-[9px] md:text-xs uppercase tracking-wider">P (Hadir)</span>
                                <div id="g2_hadir" class="font-medium text-white mt-0.5 text-xs md:text-sm truncate"></div>
                            </div>
                            <div>
                                <span class="block text-red-400 text-[9px] md:text-xs uppercase tracking-wider">L (Libur)</span>
                                <div id="g2_libur" class="font-medium text-red-400 mt-0.5 text-xs md:text-sm truncate"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Lapangan Tetap 2 -->
                    <div class="bg-slate-800/50 p-2 md:p-4 rounded-lg md:rounded-xl border border-yellow-500/30">
                        <h3 class="font-semibold text-yellow-400 mb-2 border-b border-slate-700 pb-1 md:pb-2 flex items-center gap-1 md:gap-2 text-xs md:text-base">
                            <i class="ph ph-users"></i> Lapangan Tetap 2
                        </h3>
                        <div class="grid grid-cols-2 gap-1 text-[10px] md:text-sm">
                            <div>
                                <span class="block text-blue-400 text-[9px] md:text-xs uppercase tracking-wider">P (Hadir)</span>
                                <div id="g3_hadir" class="font-medium text-white mt-0.5 text-xs md:text-sm truncate"></div>
                            </div>
                            <div>
                                <span class="block text-red-400 text-[9px] md:text-xs uppercase tracking-wider">L (Libur)</span>
                                <div id="g3_libur" class="font-medium text-red-400 mt-0.5 text-xs md:text-sm truncate"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabel -->
            <div class="col-span-2 glass-panel rounded-xl md:rounded-2xl shadow-xl overflow-hidden flex flex-col">
                <div class="p-3 md:p-4 border-b border-slate-700/50 bg-slate-800/30 flex items-center gap-2">
                    <i class="ph ph-table text-lg md:text-xl text-yellow-400"></i>
                    <h2 class="text-sm md:text-lg font-bold text-white">Tabel Rekapitulasi - <span id="tableMonthYear" class="text-yellow-400"></span></h2>
                </div>
                <div class="p-0 overflow-x-auto table-scroll">
                    <div id="tableContainer" class="p-3 md:p-4 pb-6 min-w-max"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ============================================================
        // JADWAL: Senin-Jumat ada Warehouse (2 orang) + Lapangan (3 orang)
        //         Sabtu-Minggu ada Warehouse (2 orang) + Libur (3 orang)
        // 
        // Aturan: Yang bertugas Warehouse Senin-Jumat, tidak bertugas 
        //         Warehouse di Sabtu-Minggu pada minggu yang sama.
        //         Dan sebisa mungkin tidak bertugas Warehouse di 
        //         minggu sebelumnya dan minggu depannya untuk Sabtu-Minggu.
        // 
        // Siklus 4 Minggu:
        //   Minggu 1: Senin-Jumat = Gilang & Ilham, Sabtu-Minggu = Ali & Wisnu
        //   Minggu 2: Senin-Jumat = Ali & Zhafran, Sabtu-Minggu = Gilang & Ilham
        //   Minggu 3: Senin-Jumat = Wisnu & Gilang, Sabtu-Minggu = Ali & Zhafran
        //   Minggu 4: Senin-Jumat = Wisnu & Ali, Sabtu-Minggu = Gilang & Ilham
        // ============================================================

        const schedule4Weeks = [
            { weekday_w: ["Gilang", "Ilham"], weekend_w: ["Ali", "Wisnu"] },
            { weekday_w: ["Ali", "Zhafran"], weekend_w: ["Gilang", "Ilham"] },
            { weekday_w: ["Wisnu", "Gilang"], weekend_w: ["Ali", "Zhafran"] },
            { weekday_w: ["Wisnu", "Ali"], weekend_w: ["Gilang", "Ilham"] }
        ];

        const group2Data = {
            RISKA: [1,2], ELISAH: [1,2], ALYA: [3,4], JELITA: [3,4], IMEL: [2,3]
        };

        const group3Data = {
            AZZAM: [6,0], FIAN: [6,0]
        };

        const fullNames = [
            { id: "Ilham", full: "MUKHAMMAD ILHAM MAULANA" },
            { id: "Zhafran", full: "ZHAFRAN RAMADHAN" },
            { id: "Wisnu", full: "MUHAMMAD WISNU" },
            { id: "Ali", full: "MUHAMMAD ALI YUSRON" },
            { id: "Gilang", full: "FAWWAZ GILANG PRADANA" },
            { id: "RISKA", full: "RISKA ANGRAENI PUTRI" },
            { id: "ELISAH", full: "ELISAH" },
            { id: "ALYA", full: "ALYA RAHMAWATI" },
            { id: "JELITA", full: "JELITA PERMATA" },
            { id: "IMEL", full: "IMEL FITRI CAHYANI" },
            { id: "AZZAM", full: "MUHAMAD AZZAM APRILADI" },
            { id: "FIAN", full: "MUHAMAD ALIFIAN RAMADHAN" }
        ];

        // Anchor date: Senin, 20 Juli 2026 (minggu 1 mulai Senin)
        const anchorDate = new Date(2026, 6, 20); 
        let currentDate = new Date(); 
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let selectedDateObj = currentDate;

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const tblDayNames = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];

        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.getFullYear(), date.getMonth(), diff);
        }

        function calculateCycles(targetDate) {
            const targetMonday = getMonday(targetDate);
            const anchorMonday = getMonday(anchorDate);
            const diffTime = targetMonday.getTime() - anchorMonday.getTime();
            const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
            return { index4: ((diffWeeks % 4) + 4) % 4 };
        }

        function getStatus(personId, date) {
            const dayOfWeek = date.getDay();
            const cycles = calculateCycles(date);
            
            const firstFive = ["Ilham", "Zhafran", "Wisnu", "Ali", "Gilang"];
            const group2Names = ["RISKA", "ELISAH", "ALYA", "JELITA", "IMEL"];
            const group3Names = ["AZZAM", "FIAN"];

            if (firstFive.includes(personId)) {
                const weekData = schedule4Weeks[cycles.index4];
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                
                if (isWeekend) {
                    if (weekData.weekend_w.includes(personId)) {
                        return 'W';
                    } else {
                        return 'L';
                    }
                } else {
                    if (weekData.weekday_w.includes(personId)) {
                        return 'W';
                    } else {
                        return 'P';
                    }
                }
            } else if (group2Names.includes(personId)) {
                const liburDays = group2Data[personId];
                if (liburDays && liburDays.includes(dayOfWeek)) {
                    return 'L';
                }
                return 'P';
            } else if (group3Names.includes(personId)) {
                const liburDays = group3Data[personId];
                if (liburDays && liburDays.includes(dayOfWeek)) {
                    return 'L';
                }
                return 'P';
            }
            return 'L';
        }

        function updateScheduleDetail(date) {
            const cycles = calculateCycles(date);
            const dayOfWeek = date.getDay();
            const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            
            document.getElementById('selectedDateDisplay').textContent = `${dayNames[dayOfWeek]}, ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
            document.getElementById('cycleDisplay').innerHTML = `Minggu: <span class="text-emerald-400 font-bold">${cycles.index4 + 1}</span>`;

            const weekData = schedule4Weeks[cycles.index4];
            const firstFive = ["Ilham", "Zhafran", "Wisnu", "Ali", "Gilang"];
            let wList = [], pList = [], lList = [];
            
            if (isWeekend) {
                wList = weekData.weekend_w;
                lList = firstFive.filter(name => !weekData.weekend_w.includes(name));
            } else {
                wList = weekData.weekday_w;
                pList = firstFive.filter(name => !weekData.weekday_w.includes(name));
            }
            
            document.getElementById('g1_w').textContent = wList.join(', ') || '-';
            document.getElementById('g1_p').textContent = pList.join(', ') || '-';
            document.getElementById('g1_l').textContent = lList.join(', ') || '-';

            const g2Hadir = [], g2Libur = [];
            const g2Order = ["RISKA", "ELISAH", "ALYA", "JELITA", "IMEL"];
            for (const name of g2Order) {
                if (group2Data[name].includes(dayOfWeek)) {
                    g2Libur.push(name);
                } else {
                    g2Hadir.push(name);
                }
            }
            document.getElementById('g2_hadir').textContent = g2Hadir.join(', ') || '-';
            document.getElementById('g2_libur').textContent = g2Libur.join(', ') || '-';

            const g3Hadir = [], g3Libur = [];
            const g3Order = ["AZZAM", "FIAN"];
            for (const name of g3Order) {
                if (group3Data[name].includes(dayOfWeek)) {
                    g3Libur.push(name);
                } else {
                    g3Hadir.push(name);
                }
            }
            document.getElementById('g3_hadir').textContent = g3Hadir.join(', ') || '-';
            document.getElementById('g3_libur').textContent = g3Libur.join(', ') || '-';
        }

        function renderTable(month, year) {
            document.getElementById('tableMonthYear').textContent = `${monthNames[month]} ${year}`;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const tableContainer = document.getElementById('tableContainer');

            let html = `<table class="min-w-max border-collapse border-2 border-black text-xs md:text-sm text-black bg-white shadow-md">`;
            html += `<thead class="bg-yellow-400 font-bold uppercase"><tr>`;
            html += `<th rowspan="2" class="border border-black px-2 md:px-3 py-1">NO</th>`;
            html += `<th rowspan="2" class="border border-black px-3 md:px-6 py-1">NAMA</th>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const dayOfWeek = new Date(year, month, i).getDay();
                html += `<th class="border border-black px-1 md:px-2 py-1 text-[10px] md:text-xs tracking-tighter">${tblDayNames[dayOfWeek]}</th>`;
            }
            html += `</tr><tr>`;
            for (let i = 1; i <= daysInMonth; i++) {
                html += `<th class="border border-black px-1 py-1 text-center">${i}</th>`;
            }
            html += `</tr></thead><tbody>`;

            fullNames.forEach((person, index) => {
                html += `<tr class="hover:bg-slate-200 transition-colors">`;
                html += `<td class="border border-black text-center font-bold px-2 py-1.5">${index + 1}</td>`;
                html += `<td class="border border-black px-3 py-1.5 whitespace-nowrap text-xs">${person.full}</td>`;

                for (let d = 1; d <= daysInMonth; d++) {
                    const checkDate = new Date(year, month, d);
                    const status = getStatus(person.id, checkDate);
                    
                    let statusClass = '';
                    let label = status;
                    if (status === 'W') statusClass = 'status-w';
                    else if (status === 'P') statusClass = 'status-p';
                    else if (status === 'L') statusClass = 'status-l';
                    
                    html += `<td class="border border-black text-center font-bold px-1 py-1 ${statusClass}">${label}</td>`;
                }
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            tableContainer.innerHTML = html;
        }

        function renderCalendar(month, year) {
            document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const realToday = new Date(); 

            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                
                const checkDate = new Date(year, month, i);
                const isSelected = (checkDate.getDate() === selectedDateObj.getDate() && checkDate.getMonth() === selectedDateObj.getMonth() && checkDate.getFullYear() === selectedDateObj.getFullYear());
                const isToday = (checkDate.getDate() === realToday.getDate() && checkDate.getMonth() === realToday.getMonth() && checkDate.getFullYear() === realToday.getFullYear());

                let btnClass = "w-6 h-6 md:w-8 md:h-8 flex items-center justify-center rounded-md md:rounded-lg mx-auto transition cursor-pointer relative ";
                
                if (isSelected) {
                    btnClass += "bg-blue-600 text-white shadow-lg shadow-blue-500/50 ";
                } else if (checkDate.getDay() === 0) {
                    btnClass += "text-red-400 hover:bg-slate-700 "; 
                } else {
                    btnClass += "text-slate-200 hover:bg-slate-700 ";
                }

                if (isToday && !isSelected) {
                    btnClass += "ring-1 md:ring-2 ring-blue-500/50 ring-inset font-bold text-blue-400 ";
                }

                btn.className = btnClass;
                btn.onclick = () => {
                    selectedDateObj = new Date(year, month, i);
                    renderCalendar(month, year);
                    updateScheduleDetail(selectedDateObj);
                };
                
                grid.appendChild(btn);
            }
            
            renderTable(month, year);
        }

        document.getElementById('prevMonth').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar(currentMonth, currentYear);
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar(currentMonth, currentYear);
        });

        document.getElementById('btnToday').addEventListener('click', () => {
            const today = new Date();
            currentMonth = today.getMonth();
            currentYear = today.getFullYear();
            selectedDateObj = today;
            renderCalendar(currentMonth, currentYear);
            updateScheduleDetail(selectedDateObj);
        });

        renderCalendar(currentMonth, currentYear);
        updateScheduleDetail(selectedDateObj);
    </script>
</body>
</html>
