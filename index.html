<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jadwal Shift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(30,41,59,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .table-scroll::-webkit-scrollbar { height: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .table-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .status-w { background:#22c55e !important; color:#000 !important; font-weight:700; }
        .status-p { background:#3b82f6 !important; color:#fff !important; font-weight:700; }
        .status-l { background:#ef4444 !important; color:#fff !important; font-weight:700; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-3 md:p-6">

    <div class="max-w-5xl mx-auto space-y-4">

        <!-- Header -->
        <div class="text-center">
            <h1 class="text-2xl md:text-3xl font-bold text-white">Jadwal Shift</h1>
            <p class="text-xs text-slate-400 mt-1 flex items-center justify-center gap-3 flex-wrap">
                <span><span class="inline-block w-3 h-3 rounded bg-green-500 align-middle"></span> W</span>
                <span><span class="inline-block w-3 h-3 rounded bg-blue-500 align-middle"></span> P</span>
                <span><span class="inline-block w-3 h-3 rounded bg-red-500 align-middle"></span> L</span>
                <span class="text-slate-500">|</span>
                <span class="text-emerald-300">Warehouse</span>
                <span class="text-blue-300">Lapangan</span>
                <span class="text-red-300">Libur</span>
            </p>
        </div>

        <!-- 2 Kolom -->
        <div class="grid grid-cols-2 gap-3 md:gap-5">

            <!-- Kalender -->
            <div class="glass rounded-xl p-3 md:p-5">
                <div class="flex justify-between items-center mb-3">
                    <button id="prevMonth" class="p-1 hover:bg-slate-700 rounded-lg text-slate-300"><i class="ph ph-caret-left text-xl"></i></button>
                    <div class="text-center">
                        <h2 id="monthYear" class="text-sm md:text-lg font-semibold text-blue-400"></h2>
                        <button id="btnToday" class="text-[10px] px-2 py-0.5 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700">Hari ini</button>
                    </div>
                    <button id="nextMonth" class="p-1 hover:bg-slate-700 rounded-lg text-slate-300"><i class="ph ph-caret-right text-xl"></i></button>
                </div>
                <div class="grid grid-cols-7 gap-0.5 text-center text-[10px] md:text-xs font-medium text-slate-400">
                    <div class="text-red-400">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div class="text-blue-300">Sab</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-0.5 md:gap-1 text-center mt-1 text-xs md:text-sm"></div>
            </div>

            <!-- Detail -->
            <div class="glass rounded-xl p-3 md:p-5 border-t-4 border-t-blue-500 flex flex-col">
                <p id="selectedDateDisplay" class="text-blue-400 font-medium text-xs md:text-sm truncate"></p>
                <p id="cycleDisplay" class="text-[10px] text-slate-400 mb-2 font-mono bg-slate-800 px-2 py-0.5 rounded-md self-start"></p>

                <div class="space-y-2 text-xs md:text-sm flex-1">
                    <div class="bg-slate-800/40 p-2 md:p-3 rounded-lg">
                        <div class="font-semibold text-emerald-400 text-xs uppercase tracking-wider mb-1">Warehouse</div>
                        <div id="g1_w" class="text-white font-medium"></div>
                    </div>
                    <div class="bg-slate-800/40 p-2 md:p-3 rounded-lg">
                        <div class="font-semibold text-blue-400 text-xs uppercase tracking-wider mb-1">Lapangan</div>
                        <div id="g1_p" class="text-white font-medium"></div>
                    </div>
                    <div class="bg-slate-800/40 p-2 md:p-3 rounded-lg">
                        <div class="font-semibold text-red-400 text-xs uppercase tracking-wider mb-1">Libur</div>
                        <div id="g1_l" class="text-red-400 font-medium"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabel Rekap -->
        <div class="glass rounded-xl overflow-hidden">
            <div class="p-3 border-b border-slate-700/50 flex items-center gap-2">
                <i class="ph ph-table text-yellow-400"></i>
                <h2 class="font-bold text-sm md:text-base">Rekapitulasi — <span id="tableMonthYear" class="text-yellow-400"></span></h2>
            </div>
            <div class="p-0 overflow-x-auto table-scroll">
                <div id="tableContainer" class="p-3 pb-5 min-w-max"></div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // DATA SEDERHANA: 5 orang Group 1 (Ilham, Zhafran, Wisnu, Ali, Gilang)
        // Setiap Senin-Jumat = Lapangan (P)
        // Sabtu-Minggu = 2 orang Warehouse (W), sisanya Libur (L)
        // Siklus 4 minggu:
        //   M1: W = Wisnu & Ali
        //   M2: W = Gilang & Ilham
        //   M3: W = Ali & Zhafran
        //   M4: W = Gilang & Ilham
        // ============================================================

        const schedule = [
            { w: ["Wisnu","Ali"] },
            { w: ["Gilang","Ilham"] },
            { w: ["Ali","Zhafran"] },
            { w: ["Gilang","Ilham"] }
        ];

        const names = ["Ilham","Zhafran","Wisnu","Ali","Gilang"];
        const fullNames = {
            Ilham: "MUKHAMMAD ILHAM MAULANA",
            Zhafran: "ZHAFRAN RAMADHAN",
            Wisnu: "MUHAMMAD WISNU",
            Ali: "MUHAMMAD ALI YUSRON",
            Gilang: "FAWWAZ GILANG PRADANA"
        };

        const anchorDate = new Date(2026,6,13);
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let selectedDateObj = currentDate;

        const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        const dayNames = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
        const tblDayNames = ["MINGGU","SENIN","SELASA","RABU","KAMIS","JUMAT","SABTU"];

        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.getFullYear(), date.getMonth(), diff);
        }

        function getCycle(date) {
            const targetMon = getMonday(date);
            const anchorMon = getMonday(anchorDate);
            const diffWeeks = Math.floor((targetMon - anchorMon) / (1000*60*60*24*7));
            return ((diffWeeks % 4) + 4) % 4;
        }

        function getStatus(name, date) {
            const dow = date.getDay();
            const isWeekend = (dow === 0 || dow === 6);
            const cycle = getCycle(date);

            if (isWeekend) {
                if (schedule[cycle].w.includes(name)) return 'W';
                return 'L';
            }
            return 'P';
        }

        function updateDetail(date) {
            const dow = date.getDay();
            const isWeekend = (dow === 0 || dow === 6);
            const cycle = getCycle(date);

            document.getElementById('selectedDateDisplay').textContent = `${dayNames[dow]}, ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
            document.getElementById('cycleDisplay').textContent = `Minggu ${cycle + 1}`;

            const wList = isWeekend ? schedule[cycle].w : [];
            const pList = isWeekend ? [] : names;
            const lList = isWeekend ? names.filter(n => !schedule[cycle].w.includes(n)) : [];

            document.getElementById('g1_w').textContent = wList.join(', ') || '-';
            document.getElementById('g1_p').textContent = pList.join(', ') || '-';
            document.getElementById('g1_l').textContent = lList.join(', ') || '-';
        }

        function renderTable(month, year) {
            document.getElementById('tableMonthYear').textContent = `${monthNames[month]} ${year}`;
            const days = new Date(year, month+1, 0).getDate();
            let html = `<table class="border-collapse border-2 border-black text-xs md:text-sm text-black bg-white shadow-md">`;
            html += `<thead class="bg-yellow-400 font-bold uppercase"><tr>`;
            html += `<th rowspan="2" class="border border-black px-2 py-1">NO</th>`;
            html += `<th rowspan="2" class="border border-black px-3 py-1">NAMA</th>`;
            for (let i=1; i<=days; i++) {
                const dow = new Date(year, month, i).getDay();
                html += `<th class="border border-black px-1 py-1 text-[10px]">${tblDayNames[dow]}</th>`;
            }
            html += `</tr><tr>`;
            for (let i=1; i<=days; i++) {
                html += `<th class="border border-black px-1 py-1 text-center">${i}</th>`;
            }
            html += `</tr></thead><tbody>`;

            names.forEach((name, idx) => {
                html += `<tr><td class="border border-black text-center font-bold px-2 py-1">${idx+1}</td>`;
                html += `<td class="border border-black px-3 py-1 whitespace-nowrap">${fullNames[name]}</td>`;
                for (let d=1; d<=days; d++) {
                    const date = new Date(year, month, d);
                    const status = getStatus(name, date);
                    let cls = status === 'W' ? 'status-w' : status === 'P' ? 'status-p' : 'status-l';
                    html += `<td class="border border-black text-center font-bold px-1 py-1 ${cls}">${status}</td>`;
                }
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('tableContainer').innerHTML = html;
        }

        function renderCalendar(month, year) {
            document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const first = new Date(year, month, 1).getDay();
            const days = new Date(year, month+1, 0).getDate();
            const today = new Date();

            for (let i=0; i<first; i++) {
                const div = document.createElement('div');
                grid.appendChild(div);
            }
            for (let i=1; i<=days; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                const date = new Date(year, month, i);
                const isSel = date.getDate() === selectedDateObj.getDate() && date.getMonth() === selectedDateObj.getMonth() && date.getFullYear() === selectedDateObj.getFullYear();
                const isToday = date.getDate() === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();

                let cls = "w-6 h-6 md:w-8 md:h-8 flex items-center justify-center rounded-md mx-auto transition cursor-pointer ";
                if (isSel) cls += "bg-blue-600 text-white shadow-lg shadow-blue-500/50 ";
                else if (date.getDay() === 0) cls += "text-red-400 hover:bg-slate-700 ";
                else cls += "text-slate-200 hover:bg-slate-700 ";
                if (isToday && !isSel) cls += "ring-1 ring-blue-500/50 font-bold text-blue-400 ";
                btn.className = cls;
                btn.onclick = () => {
                    selectedDateObj = new Date(year, month, i);
                    renderCalendar(month, year);
                    updateDetail(selectedDateObj);
                };
                grid.appendChild(btn);
            }
            renderTable(month, year);
        }

        // Events
        document.getElementById('prevMonth').onclick = () => {
            currentMonth--; if (currentMonth < 0) { currentMonth=11; currentYear--; }
            renderCalendar(currentMonth, currentYear);
        };
        document.getElementById('nextMonth').onclick = () => {
            currentMonth++; if (currentMonth > 11) { currentMonth=0; currentYear++; }
            renderCalendar(currentMonth, currentYear);
        };
        document.getElementById('btnToday').onclick = () => {
            const t = new Date();
            currentMonth = t.getMonth(); currentYear = t.getFullYear(); selectedDateObj = t;
            renderCalendar(currentMonth, currentYear);
            updateDetail(selectedDateObj);
        };

        // Init
        renderCalendar(currentMonth, currentYear);
        updateDetail(selectedDateObj);
    </script>
</body>
</html>:
