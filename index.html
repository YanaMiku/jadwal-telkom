<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Shift Terpadu - V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .table-scroll::-webkit-scrollbar { height: 8px; }
        .table-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.6); border-radius: 4px; }
        .table-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .table-scroll::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Animasi Transisi Halus */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-2 md:p-6 selection:bg-emerald-500/30 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950">

    <div class="max-w-6xl mx-auto space-y-4 md:space-y-6">
        <div class="text-center space-y-1 md:space-y-2 py-2">
            <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight">Jadwal Shift Terpadu</h1>
            <p class="text-xs md:text-sm text-slate-400 flex items-center justify-center gap-2 font-medium">
                <i class="ph ph-microsoft-excel-logo text-emerald-500"></i>
                Berdasarkan Data V12 (Juli - September 2026)
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-3 md:gap-6">
            
            <!-- 1. Kalender Section -->
            <div class="glass-panel rounded-xl md:rounded-2xl p-4 md:p-6 shadow-2xl flex flex-col lg:col-span-1 ring-1 ring-white/5">
                <div class="flex justify-between items-center mb-5 md:mb-6">
                    <button id="prevMonth" class="p-1.5 hover:bg-slate-800 rounded-lg transition-colors text-slate-400 hover:text-white">
                        <i class="ph ph-caret-left text-xl md:text-2xl"></i>
                    </button>
                    
                    <div class="text-center">
                        <h2 id="monthYear" class="text-base md:text-xl font-bold text-emerald-400 mb-1 leading-tight tracking-wide"></h2>
                        <button id="btnToday" class="inline-flex items-center justify-center gap-1.5 px-3 py-1 rounded-full bg-slate-800 hover:bg-slate-700 text-[10px] md:text-xs text-slate-300 hover:text-white border border-slate-700 transition-all shadow-sm">
                            <i class="ph ph-calendar-check text-emerald-400"></i> Ke Bulan Jadwal
                        </button>
                    </div>
                    
                    <button id="nextMonth" class="p-1.5 hover:bg-slate-800 rounded-lg transition-colors text-slate-400 hover:text-white">
                        <i class="ph ph-caret-right text-xl md:text-2xl"></i>
                    </button>
                </div>
                
                <div class="grid grid-cols-7 gap-1 text-center font-bold text-slate-500 mb-2 text-[10px] md:text-xs tracking-wider uppercase">
                    <div class="text-red-400/80">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div class="text-cyan-400/80">Sab</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-1 md:gap-2 text-center flex-grow text-[11px] md:text-sm">
                    <!-- Tanggal dirender via JS -->
                </div>
            </div>

            <!-- 2. Detail Jadwal Section -->
            <div class="glass-panel rounded-xl md:rounded-2xl p-4 md:p-6 shadow-2xl lg:col-span-2 border-t-4 border-t-emerald-500 flex flex-col overflow-hidden ring-1 ring-white/5">
                <div class="flex flex-col md:flex-row md:justify-between md:items-end mb-4 md:mb-6 gap-2 border-b border-slate-700/50 pb-4">
                    <div>
                        <h2 class="text-base md:text-xl font-bold text-white flex items-center gap-2">
                            <i class="ph ph-users-three text-emerald-400"></i> Detail Shift Harian
                        </h2>
                        <p id="selectedDateDisplay" class="text-emerald-400 font-medium text-xs md:text-sm mt-1"></p>
                    </div>
                    <div class="text-[9px] md:text-xs text-slate-400 font-mono bg-slate-900/50 px-2.5 py-1.5 rounded-lg border border-slate-700/50 inline-flex items-center gap-2 self-start md:self-end">
                        <i class="ph ph-arrows-clockwise text-emerald-400"></i> Siklus Gulir Otomatis Aktif
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-grow overflow-y-auto pr-1">
                    <!-- Tim 1 -->
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 relative overflow-hidden group hover:border-slate-600 transition-colors">
                        <div class="absolute top-0 left-0 w-1 h-full bg-cyan-500/50"></div>
                        <h3 class="font-bold text-cyan-400 mb-3 flex items-center gap-2 text-sm md:text-base">
                            <i class="ph ph-identification-card"></i> Grup 1
                        </h3>
                        <div class="grid grid-cols-2 gap-4 text-xs md:text-sm">
                            <div class="space-y-1">
                                <span class="text-slate-400 text-[10px] md:text-xs uppercase tracking-wider flex items-center gap-1.5 font-semibold">
                                    <div class="w-2.5 h-2.5 bg-emerald-500 rounded-sm shadow-[0_0_8px_rgba(16,185,129,0.4)]"></div> Masuk (M)
                                </span>
                                <div id="g1_masuk" class="font-medium text-white leading-relaxed fade-in"></div>
                            </div>
                            <div class="space-y-1">
                                <span class="text-slate-400 text-[10px] md:text-xs uppercase tracking-wider flex items-center gap-1.5 font-semibold">
                                    <div class="w-2.5 h-2.5 bg-red-500 rounded-sm shadow-[0_0_8px_rgba(239,68,68,0.4)]"></div> Libur (L)
                                </span>
                                <div id="g1_libur" class="font-medium text-red-400 leading-relaxed fade-in"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Tim 2 -->
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 relative overflow-hidden group hover:border-slate-600 transition-colors">
                        <div class="absolute top-0 left-0 w-1 h-full bg-purple-500/50"></div>
                        <h3 class="font-bold text-purple-400 mb-3 flex items-center gap-2 text-sm md:text-base">
                            <i class="ph ph-hard-hat"></i> Grup 2
                        </h3>
                        <div class="grid grid-cols-2 gap-4 text-xs md:text-sm">
                            <div class="space-y-1">
                                <span class="text-slate-400 text-[10px] md:text-xs uppercase tracking-wider flex items-center gap-1.5 font-semibold">
                                    <div class="w-2.5 h-2.5 bg-emerald-500 rounded-sm shadow-[0_0_8px_rgba(16,185,129,0.4)]"></div> Masuk (M)
                                </span>
                                <div id="g2_masuk" class="font-medium text-white leading-relaxed fade-in"></div>
                            </div>
                            <div class="space-y-1">
                                <span class="text-slate-400 text-[10px] md:text-xs uppercase tracking-wider flex items-center gap-1.5 font-semibold">
                                    <div class="w-2.5 h-2.5 bg-red-500 rounded-sm shadow-[0_0_8px_rgba(239,68,68,0.4)]"></div> Libur (L)
                                </span>
                                <div id="g2_libur" class="font-medium text-red-400 leading-relaxed fade-in"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. Tabel Rekapitulasi Section -->
            <div class="lg:col-span-3 glass-panel rounded-xl md:rounded-2xl shadow-2xl overflow-hidden flex flex-col ring-1 ring-white/5 mt-2">
                <div class="p-4 border-b border-slate-700/50 bg-slate-900/50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex items-center gap-2">
                        <div class="p-1.5 bg-yellow-400/20 rounded-lg">
                            <i class="ph ph-table text-xl text-yellow-400"></i>
                        </div>
                        <h2 class="text-base md:text-lg font-bold text-white tracking-wide">Tabel Rekap - <span id="tableMonthYear" class="text-yellow-400"></span></h2>
                    </div>
                    <div class="flex gap-4 text-[10px] md:text-xs text-slate-300 font-medium bg-slate-950/50 px-3 py-1.5 rounded-lg border border-slate-800">
                        <span class="flex items-center gap-1.5"><div class="w-3 h-3 bg-emerald-500 rounded-[3px] shadow-sm"></div> M (Masuk)</span>
                        <span class="flex items-center gap-1.5"><div class="w-3 h-3 bg-red-500 rounded-[3px] shadow-sm"></div> L (Libur)</span>
                    </div>
                </div>
                
                <div class="p-0 overflow-x-auto table-scroll bg-slate-50 relative">
                    <div id="tableContainer" class="min-w-max">
                        <!-- Tabel digenerate dinamis -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        /* 
           DATA JADWAL BERDASARKAN ANALISIS EXCEL V12
           - Hampir semua menggunakan siklus 14 hari yang berulang konstan.
           - Gilang menggunakan siklus 21 hari.
           - Terdapat beberapa penyesuaian (exceptions) manual di bulan Juli agar 100% cocok dengan Excel.
        */
        const anchorDate = new Date(2026, 7, 3); // Titik Acuan: 3 Agustus 2026 (Senin) -> Hari ke-0

        const staffData = [
            { id: 1, shortName: "Ilham", name: "MUKHAMMAD ILHAM MAULANA", group: 1, cycleDays: 14, offIndices: [3, 4, 12, 13], exceptions: {"2026-07-23": "M"} },
            { id: 2, shortName: "Zhafran", name: "ZHAFRAN RAMADHAN", group: 1, cycleDays: 14, offIndices: [5, 6], exceptions: {} },
            { id: 3, shortName: "Wisnu", name: "MUHAMMAD WISNU", group: 1, cycleDays: 14, offIndices: [6, 7, 10, 11], exceptions: {"2026-07-26": "M", "2026-07-27": "M"} },
            { id: 4, shortName: "Ali", name: "MUHAMMAD ALI YUSRON", group: 1, cycleDays: 14, offIndices: [6, 7, 10, 11], exceptions: {"2026-07-26": "M", "2026-07-27": "M"} },
            { id: 5, shortName: "Gilang", name: "FAWWAZ GILANG PRADANA", group: 1, cycleDays: 21, offIndices: [2, 3, 11, 12], exceptions: {"2026-07-23": "L", "2026-07-24": "L", "2026-07-25": "M"} }, // 21 Hari siklus
            { id: 6, shortName: "Riska", name: "RISKA ANGRAENI PUTRI", group: 2, cycleDays: 14, offIndices: [0, 1, 7, 8], exceptions: {} },
            { id: 7, shortName: "Jelita", name: "JELITA PERMATA", group: 2, cycleDays: 14, offIndices: [2, 3, 9, 10], exceptions: {} },
            { id: 8, shortName: "Alya", name: "ALYA RAHMAWATI", group: 2, cycleDays: 14, offIndices: [2, 3, 9, 10], exceptions: {} },
            { id: 9, shortName: "Elisah", name: "ELISAH", group: 2, cycleDays: 14, offIndices: [0, 1, 7, 8], exceptions: {} },
            { id: 10, shortName: "Imel", name: "IMEL FITRI CAHYANI", group: 2, cycleDays: 14, offIndices: [2, 3, 9, 10], exceptions: {} },
            { id: 11, shortName: "Azzam", name: "MUHAMAD AZZAM AFFILADI", group: 2, cycleDays: 14, offIndices: [6, 7, 12, 13], exceptions: {} },
            { id: 12, shortName: "Alifian", name: "MUHAMAD ALIFIAN RAMADHAN", group: 2, cycleDays: 14, offIndices: [6, 7, 12, 13], exceptions: {} }
        ];

        // Format tanggal YYYY-MM-DD untuk pengecekan exception
        function getFormatDate(date) {
            const d = date.getDate().toString().padStart(2, '0');
            const m = (date.getMonth() + 1).toString().padStart(2, '0');
            const y = date.getFullYear();
            return `${y}-${m}-${d}`;
        }

        // Menentukan status (M / L) berdasarkan algoritma siklus
        function getStatus(person, date) {
            const dateStr = getFormatDate(date);
            
            // Cek apakah ada penyesuaian manual (override)
            if (person.exceptions && person.exceptions[dateStr]) {
                return person.exceptions[dateStr];
            }

            // Hitung selisih hari dengan aman menggunakan UTC untuk menghindari bias timezone
            const utcTarget = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
            const utcAnchor = Date.UTC(anchorDate.getFullYear(), anchorDate.getMonth(), anchorDate.getDate());
            const diffDays = Math.floor((utcTarget - utcAnchor) / (1000 * 60 * 60 * 24));

            // Cari index siklus saat ini
            let cycleIndex = diffDays % person.cycleDays;
            if (cycleIndex < 0) {
                cycleIndex += person.cycleDays; // Menangani tanggal sebelum anchor date
            }

            // Jika index ada di daftar offIndices, maka Libur (L), selain itu Masuk (M)
            return person.offIndices.includes(cycleIndex) ? 'L' : 'M';
        }

        // Setup Variabel State Awal - Mengarah ke bulan mulai Excel (Juli 2026)
        let currentDate = new Date(2026, 6, 21); // Set default view ke Juli 2026 agar relevan
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let selectedDateObj = currentDate;

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const tblDayNames = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

        function updateScheduleDetail(date) {
            const dayOfWeek = date.getDay();
            document.getElementById('selectedDateDisplay').textContent = `${dayNames[dayOfWeek]}, ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;

            let g1_m = [], g1_l = [];
            let g2_m = [], g2_l = [];

            staffData.forEach(person => {
                const status = getStatus(person, date);
                // Badge styling untuk nama
                const namePill = `<span class="inline-block bg-slate-800/50 border border-slate-700/50 px-2 py-0.5 rounded text-[11px] md:text-xs mb-1 mr-1">${person.shortName}</span>`;

                if (person.group === 1) {
                    if (status === 'M') g1_m.push(namePill);
                    else g1_l.push(namePill);
                } else {
                    if (status === 'M') g2_m.push(namePill);
                    else g2_l.push(namePill);
                }
            });

            // Animasi transisi sederhana (re-trigger CSS animation)
            const elements = ['g1_masuk', 'g1_libur', 'g2_masuk', 'g2_libur'];
            elements.forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('fade-in');
                void el.offsetWidth; // trigger reflow
                el.classList.add('fade-in');
            });

            document.getElementById('g1_masuk').innerHTML = g1_m.join("") || '<span class="text-slate-500 italic">-</span>';
            document.getElementById('g1_libur').innerHTML = g1_l.join("") || '<span class="text-slate-500 italic">-</span>';
            document.getElementById('g2_masuk').innerHTML = g2_m.join("") || '<span class="text-slate-500 italic">-</span>';
            document.getElementById('g2_libur').innerHTML = g2_l.join("") || '<span class="text-slate-500 italic">-</span>';
        }

        function renderTable(month, year) {
            document.getElementById('tableMonthYear').textContent = `${monthNames[month]} ${year}`;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const tableContainer = document.getElementById('tableContainer');

            let html = `<table class="min-w-max w-full border-collapse border-b-2 border-r-2 border-slate-800 text-xs text-slate-800 bg-white">`;
            
            // Header
            html += `<thead class="bg-[#1e293b] text-white uppercase tracking-wider text-[10px] md:text-xs border-b-2 border-slate-700"><tr>`;
            html += `<th rowspan="2" class="border-r border-slate-700 px-2 md:px-3 py-2 font-semibold">No</th>`;
            html += `<th rowspan="2" class="border-r border-slate-700 px-3 md:px-4 py-2 font-semibold text-left sticky left-0 z-10 bg-[#1e293b]">Nama Lengkap</th>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const dayOfWeek = new Date(year, month, i).getDay();
                let dayColor = dayOfWeek === 0 ? 'text-red-400' : (dayOfWeek === 6 ? 'text-cyan-400' : 'text-slate-300');
                html += `<th class="border-r border-slate-700 px-1 py-1 ${dayColor} font-medium">${tblDayNames[dayOfWeek]}</th>`;
            }
            html += `</tr><tr class="bg-[#334155]">`;
            for (let i = 1; i <= daysInMonth; i++) {
                html += `<th class="border-r border-slate-700 px-1 py-1 font-bold">${i}</th>`;
            }
            html += `</tr></thead><tbody>`;

            // Isi Data
            staffData.forEach((person, index) => {
                let rowBg = index % 2 === 0 ? 'bg-slate-50' : 'bg-slate-100';
                html += `<tr class="${rowBg} hover:bg-emerald-50 transition-colors border-b border-slate-300">`;
                html += `<td class="border-r border-slate-300 text-center font-medium px-2 py-2 text-slate-500">${index + 1}</td>`;
                html += `<td class="border-r border-slate-300 px-3 py-2 whitespace-nowrap text-xs md:text-sm font-bold text-slate-700 sticky left-0 z-10 ${rowBg}">${person.name}</td>`;

                for (let d = 1; d <= daysInMonth; d++) {
                    const checkDate = new Date(year, month, d);
                    const status = getStatus(person, checkDate);

                    if (status === 'M') {
                        html += `<td class="border-r border-slate-300 bg-emerald-100 text-emerald-700 text-center font-bold px-1 py-1"><div class="w-full h-full flex items-center justify-center">M</div></td>`;
                    } else {
                        html += `<td class="border-r border-slate-300 bg-red-100 text-red-600 text-center font-bold px-1 py-1"><div class="w-full h-full flex items-center justify-center">L</div></td>`;
                    }
                }
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            tableContainer.innerHTML = html;
        }

        function renderCalendar(month, year) {
            document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = "";

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Hari ini untuk indikator visual (menggunakan waktu sebenarnya)
            const realToday = new Date(); 

            // Offset hari kosong
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            // Isi hari
            for (let i = 1; i <= daysInMonth; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                
                const checkDate = new Date(year, month, i);
                const isSelected = (checkDate.getDate() === selectedDateObj.getDate() && checkDate.getMonth() === selectedDateObj.getMonth() && checkDate.getFullYear() === selectedDateObj.getFullYear());
                const isRealToday = (checkDate.getDate() === realToday.getDate() && checkDate.getMonth() === realToday.getMonth() && checkDate.getFullYear() === realToday.getFullYear());

                let btnClass = "w-7 h-7 md:w-9 md:h-9 flex items-center justify-center rounded-lg mx-auto transition-all cursor-pointer relative font-medium ";
                
                if (isSelected) {
                    btnClass += "bg-emerald-500 text-slate-950 font-bold shadow-[0_0_12px_rgba(16,185,129,0.5)] scale-110 z-10 ";
                } else if (checkDate.getDay() === 0) {
                    btnClass += "text-red-400 hover:bg-slate-800/80 hover:text-red-300 "; 
                } else {
                    btnClass += "text-slate-300 hover:bg-slate-800/80 hover:text-white ";
                }

                if (isRealToday && !isSelected) {
                    btnClass += "ring-2 ring-emerald-500/50 ring-inset text-emerald-400 font-bold ";
                }

                btn.className = btnClass;
                btn.onclick = () => {
                    selectedDateObj = new Date(year, month, i);
                    renderCalendar(month, year);
                    updateScheduleDetail(selectedDateObj);
                };
                
                grid.appendChild(btn);
            }
            
            renderTable(month, year);
        }

        document.getElementById('prevMonth').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar(currentMonth, currentYear);
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar(currentMonth, currentYear);
        });

        document.getElementById('btnToday').addEventListener('click', () => {
            // Karena jadwal berfokus pada 2026, tombol 'Hari Ini' mengarah ke jadwal terdekat
            // Jika hari ini berada di luar rentang Juli-September 2026, bawa ke bulan Juli 2026
            const today = new Date();
            if(today.getFullYear() === 2026 && today.getMonth() >= 6 && today.getMonth() <= 8) {
                currentMonth = today.getMonth();
                currentYear = today.getFullYear();
                selectedDateObj = today;
            } else {
                currentMonth = 6; // Juli
                currentYear = 2026;
                selectedDateObj = new Date(2026, 6, 21); // Sesuai awal di Excel
            }
            renderCalendar(currentMonth, currentYear);
            updateScheduleDetail(selectedDateObj);
        });

        // Inisialisasi awal saat web dibuka
        renderCalendar(currentMonth, currentYear);
        updateScheduleDetail(selectedDateObj);
    </script>
</body>
</html>
